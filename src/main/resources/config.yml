# EconomyPlugin Configuration

# The name of the currency (shown after amounts)
currency-name: "Dollars"

# The starting balance for new players
starting-balance: 100.0

# Passive income settings
passive-income:
  # Amount given to each online player per interval
  amount: 100.0
  # Interval in ticks (20 ticks = 1 second, 6000 ticks = 5 minutes)
  interval-ticks: 6000
