name: EconomyPlugin
version: 1.0.0
main: com.example.economy.EconomyPlugin
api-version: 1.20
description: A simple economy plugin with passive income.
authors: [YourName]

commands:
  balance:
    description: Check your or another player's balance.
    usage: /balance [player]
    permission: economy.balance
  pay:
    description: Pay another online player.
    usage: /pay <player> <amount>
    permission: economy.pay
  eco:
    description: Admin command to manage balances.
    usage: /eco <give|take|set> <player> <amount>
    permission: economy.admin

permissions:
  economy.balance:
    description: Allows checking own balance.
    default: true
  economy.balance.others:
    description: Allows checking other players' balances.
    default: op
  economy.pay:
    description: Allows paying other players.
    default: true
  economy.admin:
    description: Allows admin economy commands.
    default: op
